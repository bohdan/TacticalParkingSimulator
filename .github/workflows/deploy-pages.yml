name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      # Bundles + content-hashes build/ output and rewrites the HTML files'
      # script/link tags to match, in this throwaway checkout only (never committed).
      - name: Build (hashed)
        run: npm run build:prod

      # Assemble only the files the deployed site actually serves — the HTML
      # pages, styles, and the bundled build/ output (game, editor, the module
      # worker, …; Three.js is now bundled into game.js, not a separate vendor
      # file) plus .nojekyll. The TypeScript sources, README, tooling, configs
      # and node_modules are left out.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r build _site/build
          cp index.html editor.html truck-physics-demo.html touch-controls-demo.html style.css .nojekyll _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
