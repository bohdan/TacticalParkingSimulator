<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truck Physics Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: monospace; color: #e0e0e0; }
  canvas { display: block; }
  #overlay { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
             text-align: center; pointer-events: none; }
  #hud-text { font-size: 11px; color: #888; }
  #controls  { margin-top: 3px; font-size: 10px; color: #444; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="overlay">
  <div><span id="hud-text">speed: 0.0 m/s &nbsp;|&nbsp; steer: 0° &nbsp;|&nbsp; jackknife: 0°</span></div>
  <div id="controls">W/S or ↑/↓ &nbsp; drive &nbsp;&nbsp; A/D or ←/→ &nbsp; steer &nbsp;&nbsp; R &nbsp; reset</div>
</div>

<script>
"use strict";

// ─── constants ───────────────────────────────────────────────────────────────
const SCALE    = 21;        // px per metre (1.5× zoom)
let   WORLD_W  = 0;         // derived from canvas size
let   WORLD_H  = 0;

const CAB_WB   = 4.0;       // cab wheelbase (front axle → rear axle)
const CAB_LEN  = 5.5;       // total cab body length
const CAB_WID  = 2.5;
const CAB_ROVER = 0.8;      // cab rear overhang behind rear axle

const HITCH_OFF = 0.4;      // hitch behind cab rear axle

const TRL_WB   = 8.0;       // kingpin → trailer rear axle
const TRL_LEN  = 9.0;       // total trailer body length
const TRL_WID  = 2.5;
const TRL_ROVER = 0.8;      // trailer rear overhang

const MAX_STEER = 35 * Math.PI / 180;
const MAX_ART   = 75 * Math.PI / 180;   // max cab–trailer articulation angle
const MAX_SPEED = 5.0;      // m/s
const ACCEL     = 3.0;
const STEER_RATE = 60 * Math.PI / 180;  // rad/s

// ─── canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  WORLD_W = canvas.width  / SCALE;
  WORLD_H = canvas.height / SCALE;
}
resize();
window.addEventListener('resize', resize);

// ─── state ───────────────────────────────────────────────────────────────────
let state, keys = {};

function reset() {
  state = {
    // cab rear axle
    cx: WORLD_W * 0.65,
    cy: WORLD_H * 0.5,
    th: Math.PI,          // heading (cab)
    tt: Math.PI,          // trailer heading
    speed: 0,
    steer: 0,
    blocked: false,
  };
  // place trailer rear axle correctly
  const hw = hitch(state);
  state.trx = hw.x - TRL_WB * Math.cos(state.tt);
  state.try = hw.y - TRL_WB * Math.sin(state.tt);
}

// hitch position (behind cab rear axle)
function hitch(s) {
  return {
    x: s.cx - HITCH_OFF * Math.cos(s.th),
    y: s.cy - HITCH_OFF * Math.sin(s.th),
  };
}

function normAngle(a) {
  while (a >  Math.PI) a -= 2 * Math.PI;
  while (a < -Math.PI) a += 2 * Math.PI;
  return a;
}

// ─── physics step ────────────────────────────────────────────────────────────
function step(dt) {
  // 1. steering input
  const steerInput = (keys['ArrowLeft'] || keys['a'] || keys['A'] ? -1 : 0)
                   + (keys['ArrowRight'] || keys['d'] || keys['D'] ? 1 : 0);
  state.steer += steerInput * STEER_RATE * dt;
  state.steer = Math.max(-MAX_STEER, Math.min(MAX_STEER, state.steer));

  // 2. speed input
  const driveInput = (keys['ArrowUp'] || keys['w'] || keys['W'] ? 1 : 0)
                   + (keys['ArrowDown'] || keys['s'] || keys['S'] ? -1 : 0);
  state.speed += driveInput * ACCEL * dt;
  state.speed = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, state.speed));
  if (!driveInput) state.speed *= Math.pow(0.1, dt);   // friction

  const v = state.speed;
  const δ = state.steer;

  // 3. cab bicycle model — snapshot first so we can revert on articulation overrun
  const prev = { cx: state.cx, cy: state.cy, th: state.th,
                 tt: state.tt, trx: state.trx, try: state.try };
  const dth = (Math.abs(δ) > 0.0001) ? v * Math.tan(δ) / CAB_WB * dt : 0;
  state.th += dth;
  state.cx += v * Math.cos(state.th) * dt;
  state.cy += v * Math.sin(state.th) * dt;

  // 4. trailer geometric constraint
  const hw = hitch(state);
  state.tt  = Math.atan2(hw.y - state.try, hw.x - state.trx);
  state.trx = hw.x - TRL_WB * Math.cos(state.tt);
  state.try = hw.y - TRL_WB * Math.sin(state.tt);

  // 4b. articulation limit — block movement, don't push trailer
  const β = normAngle(state.th - state.tt);
  if (Math.abs(β) > MAX_ART) {
    state.cx = prev.cx; state.cy = prev.cy; state.th = prev.th;
    state.tt = prev.tt; state.trx = prev.trx; state.try = prev.try;
    state.blocked = true;
  } else {
    state.blocked = false;
  }

  // 5. wrap/clamp world bounds
  state.cx = Math.max(1, Math.min(WORLD_W - 1, state.cx));
  state.cy = Math.max(1, Math.min(WORLD_H - 1, state.cy));
}

// ─── path projection ─────────────────────────────────────────────────────────
function simPath(s, steer, totalDist, steps) {
  let p = { cx: s.cx, cy: s.cy, th: s.th, tt: s.tt, trx: s.trx, try: s.try };
  const ds = totalDist / steps;
  const cab = [{ x: p.cx, y: p.cy, th: p.th }];
  const trl = [{ x: p.trx, y: p.try, tt: p.tt }];
  for (let i = 0; i < steps; i++) {
    p.th += (Math.abs(steer) > 0.0001 ? Math.tan(steer) / CAB_WB * ds : 0);
    p.cx += Math.cos(p.th) * ds;
    p.cy += Math.sin(p.th) * ds;
    const hw = { x: p.cx - HITCH_OFF * Math.cos(p.th), y: p.cy - HITCH_OFF * Math.sin(p.th) };
    p.tt = Math.atan2(hw.y - p.try, hw.x - p.trx);
    const β2 = normAngle(p.th - p.tt);
    if (Math.abs(β2) > MAX_ART) p.tt = p.th - Math.sign(β2) * MAX_ART;
    p.trx = hw.x - TRL_WB * Math.cos(p.tt);
    p.try = hw.y - TRL_WB * Math.sin(p.tt);
    cab.push({ x: p.cx, y: p.cy, th: p.th });
    trl.push({ x: p.trx, y: p.try, tt: p.tt });
  }
  return { cab, trl };
}

// arrowDir: +1 = arrow at front face (forward travel), -1 = arrow at rear face (reverse travel)
function drawGhostRect(x, y, heading, length, frontOver, width, color, alpha, arrowDir) {
  const rearLen = length - frontOver;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(wx(x), wy(y));
  ctx.rotate(heading);
  ctx.beginPath();
  ctx.rect(-rearLen * SCALE, -width / 2 * SCALE, length * SCALE, width * SCALE);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.stroke();
  // direction chevron on the leading face
  const tipX  = (arrowDir > 0 ? frontOver : -rearLen) * SCALE;
  const baseX = tipX - arrowDir * 0.6 * SCALE;
  const aw    = 0.28 * SCALE;
  ctx.beginPath();
  ctx.moveTo(tipX, 0);
  ctx.lineTo(baseX, -aw);
  ctx.lineTo(baseX,  aw);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

const GHOST_COUNT = 10;
const GHOST_DIST  = 20;
const GHOST_STEPS = 80;   // 0.25 m/step

function drawGhosts(s) {
  const cabFront = CAB_LEN - CAB_ROVER;
  const trlFront = TRL_LEN - TRL_ROVER;
  for (const [dir, cabCol, trlCol] of [[1, '#4af', '#2b8'], [-1, '#f84', '#f42']]) {
    const path = simPath(s, s.steer, dir * GHOST_DIST, GHOST_STEPS);
    for (let g = 1; g <= GHOST_COUNT; g++) {
      const idx   = Math.round(g / GHOST_COUNT * GHOST_STEPS);
      const alpha = 0.55 - 0.04 * (g - 1);   // 0.55 → 0.19, nearest to farthest
      const c = path.cab[idx];
      const t = path.trl[idx];
      drawGhostRect(c.x, c.y, c.th, CAB_LEN, cabFront, CAB_WID, cabCol, alpha,  dir);
      drawGhostRect(t.x, t.y, t.tt, TRL_LEN, trlFront, TRL_WID, trlCol, alpha,  dir);
    }
  }
}

// ─── rendering ───────────────────────────────────────────────────────────────
function wx(x) { return x * SCALE; }
function wy(y) { return y * SCALE; }

function drawRect(x, y, heading, length, frontOver, width, color, borderColor) {
  // x,y = rear axle. frontOver = distance forward from rear axle. length backwards from that.
  ctx.save();
  ctx.translate(wx(x), wy(y));
  ctx.rotate(heading);
  ctx.beginPath();
  // from -(length - frontOver) behind rear axle to +frontOver in front
  const rearLen = length - frontOver;
  ctx.rect(-rearLen * SCALE, -width / 2 * SCALE, length * SCALE, width * SCALE);
  ctx.fillStyle = color;
  ctx.fill();
  if (borderColor) { ctx.strokeStyle = borderColor; ctx.lineWidth = 1; ctx.stroke(); }
  ctx.restore();
}

function drawCab(s) {
  // cab rear axle = (s.cx, s.cy)
  // body extends CAB_ROVER back, (CAB_LEN - CAB_ROVER) forward
  const frontOver = CAB_LEN - CAB_ROVER;
  drawRect(s.cx, s.cy, s.th, CAB_LEN, frontOver, CAB_WID, '#1a2a4a', '#4a6a9a');

  // windscreen line
  ctx.save();
  ctx.translate(wx(s.cx), wy(s.cy));
  ctx.rotate(s.th);
  ctx.strokeStyle = '#6af';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  const wsy = CAB_WID * 0.5 * 0.7 * SCALE;
  const wsx = (frontOver - 0.8) * SCALE;
  ctx.moveTo(wsx, -wsy);
  ctx.lineTo(wsx,  wsy);
  ctx.stroke();
  ctx.restore();
}

function drawTrailer(s) {
  // trailer rear axle = (s.trx, s.try)
  const frontOver = TRL_LEN - TRL_ROVER;
  drawRect(s.trx, s.try, s.tt, TRL_LEN, frontOver, TRL_WID, '#888880', '#aaa');

  // rear door seam
  ctx.save();
  ctx.translate(wx(s.trx), wy(s.try));
  ctx.rotate(s.tt);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const hw2 = TRL_WID * 0.5 * SCALE;
  ctx.moveTo(-TRL_ROVER * SCALE, -hw2);
  ctx.lineTo(-TRL_ROVER * SCALE,  hw2);
  ctx.stroke();
  ctx.restore();
}

function drawHitch(s) {
  const hw = hitch(s);
  ctx.beginPath();
  ctx.arc(wx(hw.x), wy(hw.y), 4, 0, Math.PI * 2);
  ctx.fillStyle = '#f55';
  ctx.fill();
}

function drawGround() {
  ctx.fillStyle = '#1e2830';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // faint grid
  ctx.strokeStyle = '#252f38';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= WORLD_W; x += 5) {
    ctx.beginPath(); ctx.moveTo(wx(x), 0); ctx.lineTo(wx(x), wy(WORLD_H)); ctx.stroke();
  }
  for (let y = 0; y <= WORLD_H; y += 5) {
    ctx.beginPath(); ctx.moveTo(0, wy(y)); ctx.lineTo(wx(WORLD_W), wy(y)); ctx.stroke();
  }
}

function jackknife() {
  let a = (state.th - state.tt) * 180 / Math.PI;
  // normalise to -180..180
  while (a > 180) a -= 360;
  while (a < -180) a += 360;
  return a;
}

function updateHUD() {
  const jk = jackknife();
  const warn = Math.abs(jk) > 30;
  const el = document.getElementById('hud-text');
  const suffix = state.blocked ? '  ✖ BLOCKED' : (warn ? '  ⚠ JACKKNIFE' : '');
  el.textContent = `speed: ${state.speed.toFixed(1)} m/s  |  steer: ${(state.steer*180/Math.PI).toFixed(0)}°  |  jackknife: ${jk.toFixed(0)}°${suffix}`;
  el.style.color = state.blocked ? '#f55' : (warn ? '#fa0' : '#888');
}

// ─── loop ─────────────────────────────────────────────────────────────────────
let last = null;
function loop(ts) {
  const dt = last ? Math.min((ts - last) / 1000, 0.05) : 0;
  last = ts;
  step(dt);
  drawGround();
  drawGhosts(state);
  drawTrailer(state);
  drawCab(state);
  drawHitch(state);
  updateHUD();
  requestAnimationFrame(loop);
}

// ─── input ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'r' || e.key === 'R') reset();
  // prevent page scroll from arrows
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── start ───────────────────────────────────────────────────────────────────
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
