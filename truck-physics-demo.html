<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truck Physics Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: monospace; color: #e0e0e0; }
  canvas { display: block; }

  /* ── HUD overlay (bottom-centre) ── */
  #overlay { position: fixed; bottom: 14px; left: calc(50% - 100px);
             transform: translateX(-50%); text-align: center; pointer-events: none; }
  #hud-text  { font-size: 11px; color: #888; }
  #kb-hint   { margin-top: 3px; font-size: 10px; color: #444; }

  /* ── Side panel ── */
  #panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 200px;
    background: rgba(8,13,22,0.88); border-left: 1px solid #1e2e3e;
    padding: 12px 10px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 5px;
    font-size: 11px; color: #aaa;
  }
  #panel .sec {
    color: #4a7a8a; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 8px; padding-bottom: 3px;
    border-bottom: 1px solid #1e2e3e;
  }
  #panel label.chk { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #panel label.chk input { cursor: pointer; accent-color: #4af; }
  #panel .row { display: flex; flex-direction: column; gap: 1px; }
  #panel .lrow { display: flex; justify-content: space-between; }
  #panel .val  { color: #4af; }
  #panel input[type=range] { width: 100%; cursor: pointer; accent-color: #4af; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="overlay">
  <div><span id="hud-text">speed: 0.0 m/s &nbsp;|&nbsp; steer: 0° &nbsp;|&nbsp; jackknife: 0°</span></div>
  <div id="kb-hint">W/S or ↑/↓ &nbsp; drive &nbsp;&nbsp; A/D or ←/→ &nbsp; steer &nbsp;&nbsp; R &nbsp; reset</div>
</div>

<div id="panel">
  <div class="sec">Visualization</div>
  <div class="row">
    <div class="lrow"><span>Zoom</span><span class="val" id="zoomVal">21 px/m</span></div>
    <input type="range" id="zoom" min="8" max="42" step="1" value="21">
  </div>
  <label class="chk"><input type="checkbox" id="showGhosts" checked> Ghost outlines</label>
  <label class="chk"><input type="checkbox" id="showTrail"  checked> Path lines</label>

  <div class="row">
    <div class="lrow"><span>Projection</span><span class="val" id="projDistVal">20 m</span></div>
    <input type="range" id="projDist" min="5" max="40" step="1" value="20">
  </div>
  <div class="row">
    <div class="lrow"><span>Ghost count</span><span class="val" id="ghostCountVal">10</span></div>
    <input type="range" id="ghostCount" min="2" max="20" step="1" value="10">
  </div>
  <div class="row">
    <div class="lrow"><span>Arrow every</span><span class="val" id="arrowEveryVal">4 m</span></div>
    <input type="range" id="arrowEvery" min="1" max="10" step="1" value="4">
  </div>

  <div class="sec">Vehicle</div>
  <div class="row">
    <div class="lrow"><span>Max steer</span><span class="val" id="maxSteerVal">35°</span></div>
    <input type="range" id="maxSteer" min="10" max="55" step="1" value="35">
  </div>
  <div class="row">
    <div class="lrow"><span>Art. limit</span><span class="val" id="maxArtVal">75°</span></div>
    <input type="range" id="maxArt" min="20" max="90" step="1" value="75">
  </div>
  <div class="row">
    <div class="lrow"><span>Cab wheelbase</span><span class="val" id="cabWbVal">4.0 m</span></div>
    <input type="range" id="cabWb" min="1.5" max="7" step="0.5" value="4">
  </div>
  <div class="row">
    <div class="lrow"><span>Trailer axle</span><span class="val" id="trlWbVal">8.0 m</span></div>
    <input type="range" id="trlWb" min="2" max="15" step="0.5" value="8">
  </div>
  <div class="row">
    <div class="lrow"><span>Hitch offset</span><span class="val" id="hitchOffVal">0.4 m</span></div>
    <input type="range" id="hitchOff" min="0" max="2" step="0.1" value="0.4">
  </div>
</div>

<script src="build/truck-physics-demo.js"></script>
</body>
</html>
