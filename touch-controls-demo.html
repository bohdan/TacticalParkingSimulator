<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Touch Controls Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: #171a21; overflow: hidden; font-family: system-ui, sans-serif; color: #e7ecf3; }

  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  #cvWrap { flex: 1; min-height: 0; position: relative; background: #0e1117; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  #hud { position: absolute; top: 8px; left: 10px; right: 10px;
         pointer-events: none; font-family: monospace; }
  #hud-text { font-size: 12px; color: #9ab; }
  #hud-hint { margin-top: 3px; font-size: 11px; color: #567; }

  /* ── bottom panel, sized like the game's #panel ── */
  #panel { flex-shrink: 0; background: #1b1f2a; border-top: 1px solid #2a3142;
           padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 6px;
           max-height: 46vh; overflow-y: auto; }
  .modes { display: flex; gap: 5px; flex-wrap: wrap; }
  .mode-btn { flex: 1 1 auto; min-width: 64px; text-align: center; padding: 7px 6px;
              border-radius: 8px; border: 1px solid #2a3142; background: #222837;
              color: #cdd; cursor: pointer; font-size: 12px; font-weight: 600; }
  .mode-btn.on { background: #1d4f6b; border-color: #2d7396; color: #fff; }
  .mode-desc { font-size: 10.5px; color: #7c8aa3; line-height: 1.35; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; color: #aab; }
  .ctrl-row label.chk { display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }
  .ctrl-row label.chk input { cursor: pointer; accent-color: #4af; }
  select { background: #222837; color: #cdd; border: 1px solid #2a3142;
           border-radius: 6px; padding: 5px 6px; font-size: 11px; }
  .readout { display: flex; gap: 14px; font-size: 11px; color: #aab; }
  .readout .val { color: #4af; font-weight: 700; }
  button.reset { padding: 5px 10px; border-radius: 6px; border: 1px solid #4a2530;
                 background: #2a1418; color: #f88; cursor: pointer; font-size: 11px; }
</style>
</head>
<body>
<div id="app">
  <div id="cvWrap">
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div id="hud-text">steer: 0° &nbsp;|&nbsp; dist: 0.00 m &nbsp;|&nbsp; axis: —</div>
      <div id="hud-hint"></div>
    </div>
  </div>

  <div id="panel">
    <div class="modes">
      <button class="mode-btn" data-mode="A">A · combined</button>
      <button class="mode-btn" data-mode="B">B · zones</button>
      <button class="mode-btn" data-mode="C">C · dir-lock</button>
      <button class="mode-btn" data-mode="D">D · twin-stick</button>
    </div>
    <div class="mode-desc" id="modeDesc"></div>

    <div class="ctrl-row">
      <label class="chk"><input type="checkbox" id="showZones" checked> zone circles</label>
      <select id="fallbackMode">
        <option value="combined">outside-zone → combined (A)</option>
        <option value="lock">outside-zone → direction-lock (C)</option>
      </select>
      <label class="chk"><input type="checkbox" id="scrollNudge" checked> scroll = dist</label>
      <select id="vehicle">
        <option value="default">Sedan</option>
        <option value="miata">Miata</option>
        <option value="bus">Bus</option>
        <option value="tractor">Tractor</option>
      </select>
    </div>

    <div class="ctrl-row">
      <div class="readout">
        <span>steer <span class="val" id="steerVal">0°</span></span>
        <span>dist <span class="val" id="distVal">0.00 m</span></span>
        <span>axis <span class="val" id="axisVal">—</span></span>
      </div>
      <button class="reset" id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<script type="module" src="build/touch-controls-demo.js"></script>
</body>
</html>
