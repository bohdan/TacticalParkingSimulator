<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Touch Controls Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e1117; overflow: hidden; font-family: system-ui, sans-serif; color: #e0e0e0; }
  canvas { display: block; touch-action: none; }

  #overlay { position: fixed; bottom: 14px; left: 12px; right: 220px;
             pointer-events: none; font-family: monospace; }
  #hud-text { font-size: 12px; color: #9ab; }
  #hud-hint { margin-top: 4px; font-size: 11px; color: #567; }

  #panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 210px;
    background: rgba(8,13,22,0.92); border-left: 1px solid #1e2e3e;
    padding: 12px 10px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 6px;
    font-size: 11px; color: #aaa;
  }
  #panel .sec {
    color: #4a7a8a; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 10px; padding-bottom: 3px;
    border-bottom: 1px solid #1e2e3e;
  }
  #panel .modes { display: flex; flex-direction: column; gap: 4px; }
  #panel .mode-btn {
    text-align: left; padding: 7px 8px; border-radius: 6px; border: 1px solid #22314a;
    background: #141b2b; color: #cdd; cursor: pointer; font-size: 11px;
  }
  #panel .mode-btn b { color: #fff; }
  #panel .mode-btn.on { background: #1d4f6b; border-color: #2d7396; }
  #panel .mode-desc { font-size: 10px; color: #789; margin: 2px 0 4px; line-height: 1.4; }
  #panel label.chk { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  #panel label.chk input { cursor: pointer; accent-color: #4af; }
  #panel select { width: 100%; background: #141b2b; color: #cdd; border: 1px solid #22314a;
                  border-radius: 5px; padding: 4px; font-size: 11px; }
  #panel .row { display: flex; flex-direction: column; gap: 1px; }
  #panel .lrow { display: flex; justify-content: space-between; }
  #panel .val  { color: #4af; }
  #panel button.reset {
    margin-top: 6px; padding: 6px; border-radius: 6px; border: 1px solid #4a2530;
    background: #2a1418; color: #f88; cursor: pointer; font-size: 11px;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="overlay">
  <div id="hud-text">steer: 0° &nbsp;|&nbsp; dist: 0.00 m &nbsp;|&nbsp; axis: —</div>
  <div id="hud-hint"></div>
</div>

<div id="panel">
  <div class="sec">Control scheme</div>
  <div class="modes">
    <button class="mode-btn" data-mode="A"><b>A</b> — Combined arc-drag (current game)</button>
    <button class="mode-btn" data-mode="B"><b>B</b> — Front/back zones + fallback</button>
    <button class="mode-btn" data-mode="C"><b>C</b> — Direction-lock (no zones)</button>
    <button class="mode-btn" data-mode="D"><b>D</b> — Radial twin-stick dial</button>
  </div>
  <div class="mode-desc" id="modeDesc"></div>

  <div class="sec">Zone / tolerance (mode B)</div>
  <label class="chk"><input type="checkbox" id="showZones" checked> Show front/back zone circles</label>
  <div class="row">
    <span>Outside-zone touches:</span>
    <select id="fallbackMode">
      <option value="combined">Fall back to combined drag (A)</option>
      <option value="lock">Fall back to direction-lock (C)</option>
    </select>
  </div>

  <div class="sec">Desktop extra</div>
  <label class="chk"><input type="checkbox" id="scrollNudge" checked> Scroll wheel nudges distance</label>

  <div class="sec">Vehicle</div>
  <select id="vehicle">
    <option value="default">Sedan</option>
    <option value="miata">Miata</option>
    <option value="bus">Bus</option>
    <option value="tractor">Tractor</option>
  </select>

  <div class="sec">Readout</div>
  <div class="row"><div class="lrow"><span>Steer</span><span class="val" id="steerVal">0°</span></div></div>
  <div class="row"><div class="lrow"><span>Dist</span><span class="val" id="distVal">0.00 m</span></div></div>
  <div class="row"><div class="lrow"><span>Axis lock</span><span class="val" id="axisVal">—</span></div></div>

  <button class="reset" id="resetBtn">Reset steer/dist</button>
</div>

<script type="module" src="build/touch-controls-demo.js"></script>
</body>
</html>
